<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Document -->
  <rect x="14" y="10" width="36" height="44" rx="4"
        fill="none" stroke="black" stroke-width="3"/>

  <!-- Folded corner -->
  <polyline points="38,10 50,22 38,22"
            fill="none" stroke="black" stroke-width="3"/>

  <!-- Compression arrows (inward) -->
  <line x1="10" y1="32" x2="22" y2="32"
        stroke="black" stroke-width="3"/>
  <polygon points="22,32 18,28 18,36" fill="black"/>

  <line x1="54" y1="32" x2="42" y2="32"
        stroke="black" stroke-width="3"/>
  <polygon points="42,32 46,28 46,36" fill="black"/>

  <!-- Small "compression squeeze" lines -->
  <line x1="26" y1="26" x2="38" y2="24"
        stroke="black" stroke-width="2"/>
  <line x1="26" y1="38" x2="38" y2="40"
        stroke="black" stroke-width="2"/>
</svg>
